services:
db:
    image: postgres:16-alpine
    container_name: spu-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-planning}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-planning_secret}
      POSTGRES_DB: ${POSTGRES_DB:-strategic_planning}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planning -d strategic_planning"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
      
  backend:
    image: ghcr.io/ahmetdemirellisu/strategic-planning-application/backend:latest
    container_name: spu-backend
    environment:
      NODE_ENV: production
      PORT: 9001
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET:-change-me-very-secret}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: ${EMAIL_USER:-}
      SMTP_PASS: ${EMAIL_PASS:-}
      SMTP_FROM: "EDU HOTEL <${EMAIL_USER:-}>"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9001:9001"
    networks:
      - spu-network

  frontend:
    image: ghcr.io/ahmetdemirellisu/strategic-planning-application/frontend:latest
    container_name: spu-frontend
    depends_on:
      - backend
    ports:
      - "8001:8001"
    networks:
      - spu-network

networks:
  spu-network:
    driver: bridge
