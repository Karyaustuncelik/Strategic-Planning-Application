services:
  db:
    image: postgres:16-alpine
    container_name: spu-db
    network_mode: host
    command: postgres -p ${POSTGRES_PORT:-7001}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: ${POSTGRES_PORT:-7001}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -p ${POSTGRES_PORT:-7001} -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    image: ghcr.io/ahmetdemirellisu/strategic-planning-application/backend:latest
    container_name: spu-backend
    network_mode: host
    command: sh -c "npx prisma migrate deploy && PORT=${BACKEND_PORT:-9001} npm run start"
    environment:
      NODE_ENV: production
      PORT: ${BACKEND_PORT:-9001}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@localhost:${POSTGRES_PORT:-7001}/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET:-change-me-very-secret}
      JWT_EXPIRES_IN: 1d
      JWT_REFRESH_EXPIRES_IN: 7d
      CLIENT_URL: ${CORS_ORIGIN:-http://localhost:8001}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ghcr.io/ahmetdemirellisu/strategic-planning-application/frontend:latest
    container_name: spu-frontend
    network_mode: host
    extra_hosts:
      - "spu-backend:127.0.0.1"
      - "backend:127.0.0.1"
    depends_on:
      - backend
