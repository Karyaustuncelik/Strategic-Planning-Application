server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 1. Backend Yönlendirmesi (En spesifik kural en üstte)
    location /spu/api/ {
        proxy_pass http://backend:3000/; # Sondaki slash '/' önemli, path'i budar
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. Statik Dosyalar (JS, CSS vb.)
    # Dışarıdan /spu/static/main.js olarak gelecek
    location ~* ^/spu/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        # URL'deki /spu kısmını silip root içindeki gerçek dosyaya bakıyoruz
        rewrite ^/spu/(.*) /$1 break;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 3. Frontend Uygulaması (SPA)
    location /spu/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
    }

    # Eğer bir şekilde kök dizine istek gelirse /ktmmu/'ya yönlendir
    location / {
        return 301 $scheme://$host/spu/;
    }
}
