server {
    listen 8001;
    server_name _;

    root /usr/share/nginx/html/spu;
    index index.html;

    # -------------------------------------------------------
    # API Proxy — /spu/api/  (local direct: localhost:8001/spu/...)
    # network_mode:host sayesinde localhost:9001 backend'e ulaşır
    # -------------------------------------------------------
    location /spu/api/ {
        rewrite ^/spu/api/(.*) /api/$1 break;
        proxy_pass http://spu-backend:9001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------
    # API Proxy — /api/  (sunucu erişimi: dış nginx /spu strip eder)
    # -------------------------------------------------------
    location /api/ {
        proxy_pass http://spu-backend:9001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------
    # SPA — /spu/  (local direct access: localhost:8001/spu/...)
    # Dosyalar /usr/share/nginx/html/spu/ altında
    # -------------------------------------------------------
    location /spu/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /spu/index.html;
    }

    # -------------------------------------------------------
    # SPA — /  (sunucu erişimi: dış nginx /spu strip eder)
    # root /spu dizinini base alır
    # -------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
