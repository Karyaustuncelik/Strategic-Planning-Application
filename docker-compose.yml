services:
  db:
    image: postgres:16-alpine
    container_name: spu-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data:Z
    ports:
      - "${POSTGRES_PORT:-7001}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - spu-network

  backend:
    build: ./backend
    container_name: spu-backend
    environment:
      NODE_ENV: production
      PORT: ${BACKEND_PORT:-9001}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET:-change-me-very-secret}
      JWT_EXPIRES_IN: 1d
      JWT_REFRESH_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:${FRONTEND_PORT:-8001}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8001}
    ports:
      - "${BACKEND_PORT:-9001}:9001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - spu-network

  frontend:
    build: ./frontend
    container_name: spu-frontend
    ports:
      - "${FRONTEND_PORT:-8001}:8001"
    depends_on:
      - backend
    networks:
      - spu-network

networks:
  spu-network:
    driver: bridge
