services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: strategic-planning-app
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8001}:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: strategic-planning-backend
    ports:
      - "${BACKEND_PORT:-9001}:9001"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=9001
      - DATABASE_URL=postgresql://${POSTGRES_USER:-planning}:${POSTGRES_PASSWORD:-planning_secret}@db:5432/${POSTGRES_DB:-strategic_planning}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:8001}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  db:
    image: postgres:16-alpine
    container_name: strategic-planning-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-planning}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-planning_secret}
      POSTGRES_DB: ${POSTGRES_DB:-strategic_planning}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planning -d strategic_planning"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
